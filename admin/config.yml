backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "العروض والمنتجات"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "اسم الغرفة / المنتج", name: "title", widget: "string" }
      - { label: "صورة المنتج الرئيسية", name: "image", widget: "image" }
      - { label: "الوصف والتفاصيل", name: "description", widget: "text" }
      - { label: "السعر (اختياري)", name: "price", widget: "string", required: false }
      - { label: "رابط الواتساب المباشر للطلب", name: "whatsapp_link", widget: "string" }
      
