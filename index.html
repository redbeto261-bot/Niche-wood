<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niche Wood | Built with style</title>
    <!-- ربط مكتبة لوحة التحكم Netlify Identity -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <meta name="google-site-verification" content="AAACRLDqvLZ04ttpJ7mcgZfBBnt_GLEO_WVVJLqbUJQ" />
    <style>
        /* التنسيقات العامة والألوان المعتمدة للهوية */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #E8E1D5; /* لون الكتان الأبيض */
            color: #4C362D; /* لون البني العميق */
        }
        
        /* تنسيق الهيدر واللوجو الجديد */
        .main-header {
            width: 100%;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #4C362D; /* لون البني العميق المتناسق مع خلفية اللوجو */
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .logo-container {
            max-width: 280px; /* حجم مثالي للوجو على الموبايل والشاشات */
            width: 100%;
            text-align: center;
        }
        .brand-logo {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* قسم المحتوى والمنتجات */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        .intro-text {
            margin-bottom: 40px;
        }
        .intro-text h2 {
            font-size: 24px;
            color: #4C362D;
            margin-bottom: 10px;
        }
        .intro-text p {
            font-size: 16px;
            color: #88937B; /* لون الرمادي السايدج المعتمد */
            font-weight: 500;
        }

        /* معرض المنتجات (يتم تحديثه تلقائياً من لوحة التحكم) */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .no-products {
            grid-column: 1 / -1;
            padding: 40px;
            background: #ffffff;
            border-radius: 8px;
            border: 1px dashed #88937B;
            color: #88937B;
        }

        /* الفوتر السفلي */
        footer {
            background-color: #4C362D;
            color: #E8E1D5;
            text-align: center;
            padding: 20px;
            margin-top: 60px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- هيدر الموقع مع اللوجو الفخم من الصورة 1000254343_2.jpg -->
    <header class="main-header">
        <div class="logo-container">
            <img src="1000254343_2.jpg" alt="Niche Wood Logo" class="brand-logo">
        </div>
    </header>

    <!-- الجسم الرئيسي للموقع -->
    <main class="container">
        <div class="intro-text">
            <h2>مرحباً بكم في Niche Wood</h2>
            <p>Built with style</p>
        </div>

        <!-- هنا تظهر المنتجات والعروض التي تضيفها من لوحة التحكم -->
        <section class="products-grid">
            <div class="no-products">
                <p>قم بالدخول إلى لوحة التحكم لرفع أولى منتجاتك وعروضك المميزة الآن!</p>
            </div>
        </section>
    </main>

    <!-- فوتر الموقع -->
    <footer>
        <p>&copy; 2026 Niche Wood - جميع الحقوق محفوظة.</p>
    </footer>

    <!-- سكريبت توجيه المستخدمين عند تسجيل الدخول للوحة التحكم -->
    <script>
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
